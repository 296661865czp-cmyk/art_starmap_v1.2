<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="round">
      <rect width="512" height="512" rx="80" ry="80"/>
    </clipPath>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="50%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFC107" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="starGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g clip-path="url(#round)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bgGrad)"/>

    <!-- Swirl strokes - Van Gogh style -->
    <g opacity="0.3" fill="none" stroke-linecap="round">
      <path d="M100,400 Q200,200 400,150 Q500,130 512,200" stroke="#5C6BC0" stroke-width="18"/>
      <path d="M0,350 Q150,250 300,300 Q450,350 512,250" stroke="#3F51B5" stroke-width="14"/>
      <path d="M50,500 Q200,350 350,380 Q480,400 512,350" stroke="#1E88E5" stroke-width="20"/>
      <path d="M0,150 Q100,100 250,180 Q400,260 512,100" stroke="#42A5F5" stroke-width="12"/>
      <path d="M80,0 Q200,80 300,50 Q420,20 512,80" stroke="#7986CB" stroke-width="16"/>
      <path d="M0,250 Q80,180 200,220 Q350,270 450,180" stroke="#283593" stroke-width="22"/>
      <path d="M150,512 Q250,420 380,450 Q480,470 512,420" stroke="#1565C0" stroke-width="15"/>
      <path d="M0,80 Q120,160 200,100 Q300,40 400,120" stroke="#5C6BC0" stroke-width="10"/>
    </g>

    <!-- Circular swirl pattern -->
    <g opacity="0.2" fill="none" stroke-linecap="round">
      <ellipse cx="380" cy="140" rx="100" ry="80" stroke="#7986CB" stroke-width="12" transform="rotate(30 380 140)"/>
      <ellipse cx="130" cy="380" rx="90" ry="70" stroke="#5C6BC0" stroke-width="14" transform="rotate(-20 130 380)"/>
      <ellipse cx="260" cy="260" rx="180" ry="140" stroke="#3F51B5" stroke-width="8" transform="rotate(15 260 260)"/>
    </g>

    <!-- Small stars in background -->
    <g fill="#FFFFFF" opacity="0.6">
      <circle cx="120" cy="80" r="3"/>
      <circle cx="400" cy="60" r="2.5"/>
      <circle cx="450" cy="120" r="2"/>
      <circle cx="80" cy="180" r="2"/>
      <circle cx="60" cy="300" r="2.5"/>
      <circle cx="440" cy="320" r="3"/>
      <circle cx="350" cy="450" r="2"/>
      <circle cx="150" cy="440" r="2.5"/>
      <circle cx="480" cy="420" r="2"/>
      <circle cx="30" cy="450" r="2"/>
    </g>

    <!-- Star glow halo -->
    <circle cx="256" cy="256" r="80" fill="url(#starGlow)" opacity="0.5" filter="url(#softGlow)"/>
    <circle cx="256" cy="256" r="50" fill="url(#starGlow)" opacity="0.4" filter="url(#glow)"/>

    <!-- Four-pointed diamond star -->
    <g filter="url(#glow)">
      <polygon
        points="256,170 272,240 342,256 272,272 256,342 240,272 170,256 240,240"
        fill="url(#starGrad)"
        stroke="#FFF8E1" stroke-width="1.5"
      />
    </g>

    <!-- Inner star sparkle lines -->
    <g stroke="#FFFFFF" stroke-width="1" opacity="0.7" stroke-linecap="round">
      <line x1="256" y1="190" x2="256" y2="158"/>
      <line x1="256" y1="322" x2="256" y2="354"/>
      <line x1="190" y1="256" x2="158" y2="256"/>
      <line x1="322" y1="256" x2="354" y2="256"/>
      <line x1="210" y1="210" x2="188" y2="188"/>
      <line x1="302" y1="210" x2="324" y2="188"/>
      <line x1="210" y1="302" x2="188" y2="324"/>
      <line x1="302" y1="302" x2="324" y2="324"/>
    </g>

    <!-- Swirl brush strokes around the star -->
    <g fill="none" stroke-linecap="round" opacity="0.35">
      <path d="M256,170 Q310,180 320,220 Q330,260 290,250" stroke="#FFE082" stroke-width="3"/>
      <path d="M256,342 Q200,330 190,290 Q180,250 220,260" stroke="#FFE082" stroke-width="3"/>
      <path d="M342,256 Q330,310 290,320 Q250,330 260,290" stroke="#FFF8E1" stroke-width="2.5"/>
      <path d="M170,256 Q180,200 220,190 Q260,180 250,220" stroke="#FFF8E1" stroke-width="2.5"/>
    </g>
  </g>
</svg>
